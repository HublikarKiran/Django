{% extends 'includes/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="panel">
    <h1>{{ title }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary" type="submit">Save</button>
        <a class="button" href="{% url 'accounts:user_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
