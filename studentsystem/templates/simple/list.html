{% extends 'includes/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="panel">
    <h1>{{ title }}</h1>
    <div class="table-wrap">
        <table>
            <tr>
                {% for header in headers %}
                    <th>{{ header }}</th>
                {% endfor %}
            </tr>
            {% for row in rows %}
                <tr>
                    {% for value in row %}
                        <td>{{ value }}</td>
                    {% endfor %}
                </tr>
            {% empty %}
                <tr><td colspan="{{ headers|length }}">No records found.</td></tr>
            {% endfor %}
        </table>
    </div>
</section>
{% endblock %}
